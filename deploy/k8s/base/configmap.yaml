apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-config
data:
  NODE_ENV: production
  REDIS_URL: redis://redis-cluster:6379
  KAFKA_BROKERS: kafka-0.kafka-headless:9092,kafka-1.kafka-headless:9092,kafka-2.kafka-headless:9092
  FRONTEND_ORIGIN: https://portal.example-hospital.com
  JWT_ISSUER: patient-auth
  GOOGLE_OAUTH_REDIRECT_URI: https://portal.example-hospital.com/login
  GOOGLE_OAUTH_STATE_TTL_SECONDS: "600"
  STAFF_INVITE_TTL_SECONDS: "172800"
  ADMIN_BOOTSTRAP_EMAIL: admin@example-hospital.com
  SMTP_HOST: smtp.example-hospital.com
  SMTP_PORT: "587"
  SMTP_FROM: no-reply@example-hospital.com
  SMTP_SECURE: "false"
