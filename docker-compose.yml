services:
  postgres:
    image: postgres:16
    container_name: hospital-postgres
    environment:
      POSTGRES_DB: hospital
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hospital"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: hospital-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.0
    container_name: hospital-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.7.0
    container_name: hospital-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  mailpit:
    image: axllent/mailpit:v1.26
    container_name: hospital-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

  db-migrate:
    image: node:22-alpine
    container_name: hospital-db-migrate
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@postgres:5432/hospital}
      SEED_DEMO_DATA: ${SEED_DEMO_DATA:-false}
    volumes:
      - ./:/app
    command: sh -c "npm install --workspaces --include-workspace-root && npm run migrate && if [ \"$$SEED_DEMO_DATA\" = \"true\" ]; then npm run seed; else echo 'Skipping demo seed'; fi"

  auth-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: auth-service
    container_name: hospital-auth-service
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    environment: &service-env
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@postgres:5432/hospital}
      AUTH_SERVICE_DATABASE_URL: ${AUTH_SERVICE_DATABASE_URL:-postgres://postgres:postgres@postgres:5432/hospital}
      PATIENT_SERVICE_DATABASE_URL: ${PATIENT_SERVICE_DATABASE_URL:-postgres://postgres:postgres@postgres:5432/hospital}
      DOCTOR_SERVICE_DATABASE_URL: ${DOCTOR_SERVICE_DATABASE_URL:-postgres://postgres:postgres@postgres:5432/hospital}
      AVAILABILITY_SERVICE_DATABASE_URL: ${AVAILABILITY_SERVICE_DATABASE_URL:-postgres://postgres:postgres@postgres:5432/hospital}
      APPOINTMENT_SERVICE_DATABASE_URL: ${APPOINTMENT_SERVICE_DATABASE_URL:-postgres://postgres:postgres@postgres:5432/hospital}
      MEDICAL_RECORDS_SERVICE_DATABASE_URL: ${MEDICAL_RECORDS_SERVICE_DATABASE_URL:-postgres://postgres:postgres@postgres:5432/hospital}
      NOTIFICATION_SERVICE_DATABASE_URL: ${NOTIFICATION_SERVICE_DATABASE_URL:-postgres://postgres:postgres@postgres:5432/hospital}
      AUDIT_SERVICE_DATABASE_URL: ${AUDIT_SERVICE_DATABASE_URL:-postgres://postgres:postgres@postgres:5432/hospital}
      REALTIME_SERVICE_DATABASE_URL: ${REALTIME_SERVICE_DATABASE_URL:-postgres://postgres:postgres@postgres:5432/hospital}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:9092}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-super-secret-access-token-value}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-super-secret-refresh-token-value}
      JWT_ISSUER: ${JWT_ISSUER:-patient-auth}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:5173}
      OTP_TTL_SECONDS: ${OTP_TTL_SECONDS:-300}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      GOOGLE_OAUTH_REDIRECT_URI: ${GOOGLE_OAUTH_REDIRECT_URI:-http://localhost:5173/login}
      GOOGLE_OAUTH_STATE_TTL_SECONDS: ${GOOGLE_OAUTH_STATE_TTL_SECONDS:-600}
      STAFF_INVITE_TTL_SECONDS: ${STAFF_INVITE_TTL_SECONDS:-172800}
      ADMIN_BOOTSTRAP_EMAIL: ${ADMIN_BOOTSTRAP_EMAIL:-admin@hospital.local}
      ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD:-change-this-bootstrap-password}
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-no-reply@hospital.local}
      SMTP_SECURE: ${SMTP_SECURE:-false}
    ports:
      - "3001:3001"

  patient-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: patient-service
    container_name: hospital-patient-service
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_started
    environment: *service-env
    ports:
      - "3002:3002"

  doctor-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: doctor-service
    container_name: hospital-doctor-service
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    environment: *service-env
    ports:
      - "3003:3003"

  availability-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: availability-service
    container_name: hospital-availability-service
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    environment: *service-env
    ports:
      - "3004:3004"

  appointment-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: appointment-service
    container_name: hospital-appointment-service
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    environment: *service-env
    ports:
      - "3005:3005"

  medical-records-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: medical-records-service
    container_name: hospital-medical-records-service
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    environment: *service-env
    ports:
      - "3006:3006"

  realtime-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: realtime-service
    container_name: hospital-realtime-service
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_started
    environment: *service-env
    ports:
      - "3007:3007"

  notification-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: notification-service
    container_name: hospital-notification-service
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_started
      mailpit:
        condition: service_started
    environment: *service-env
    ports:
      - "3008:3008"

  audit-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: audit-service
    container_name: hospital-audit-service
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_started
    environment: *service-env
    ports:
      - "3009:3009"

  kong:
    image: kong:3.8
    container_name: hospital-kong
    depends_on:
      - auth-service
      - patient-service
      - doctor-service
      - availability-service
      - appointment-service
      - medical-records-service
      - realtime-service
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
    ports:
      - "8000:8000"
      - "8001:8001"
    volumes:
      - ./deploy/kong/kong.yml:/etc/kong/kong.yml:ro

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: hospital-web
    environment:
      VITE_API_BASE_URL: /api/v1
      VITE_PROXY_TARGET: http://kong:8000
      VITE_WS_BASE_URL: ws://localhost:3007/ws
    ports:
      - "5173:5173"
    depends_on:
      - kong

volumes:
  postgres-data:
  redis-data:
